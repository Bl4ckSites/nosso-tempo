<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Um novo recomeço...</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles2.css">
    <link rel="stylesheet" href="poesias.css">
    <style>
        /* ===== ESTILO DO "LER MAIS" PROGRESSIVO ===== */
        .poem-content .texto-curto {
            transition: opacity 0.3s ease;
        }
        
        /* Container que guarda as linhas extras, agrupadas em blocos */
        .poem-content .texto-extra {
            display: none;
            margin-top: 0.5rem;
        }
        
        .poem-content .texto-extra.visivel {
            display: block;
        }
        
        .ler-mais-btn {
            display: inline-block;
            margin-top: 0.8rem;
            color: #8b5e3c;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
            letter-spacing: 0.3px;
            border-bottom: 1px dashed #8b5e3c;
            transition: color 0.2s, border-color 0.2s;
        }
        
        .ler-mais-btn:hover {
            color: #5c3a1e;
            border-bottom-color: #5c3a1e;
        }
        
        .linha-vazia {
            height: 0.8rem;   /* espaço entre estrofes */
            margin: 0;
            padding: 0;
            line-height: 0.8rem;
        }
    </style>
</head>
<body>
     <!-- Fundo Estrelado -->
        <div id="stars-container"></div>
    
    <script>
  (function() {
    const container = document.getElementById('stars-container');
    if (!container) return;
    // Cria estrelas imediatamente, sem esperar outros scripts
    const starsCount = window.innerWidth < 768 ? 200 : 400;
    for (let i = 0; i < starsCount; i++) {
      const star = document.createElement('div');
      star.classList.add('star');
      if (Math.random() < 0.1) star.classList.add('special-star');
      const size = Math.random() * 3 + 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.opacity = Math.random() * 0.7 + 0.3;
      star.style.animationDuration = (Math.random() * 8 + 5) + 's';
      star.style.animationDelay = (Math.random() * 5) + 's';
      container.appendChild(star);
    }
  })();
</script>
    <!-- OVERLAY DE LOGIN -->
    <div id="login-overlay" style="
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(5, 0, 5, 0.95); z-index: 9999;
      display: flex; align-items: center; justify-content: center;
    ">
        <div style="
          background: rgba(30, 15, 40, 0.95);
          border: 2px solid #D4AF37;
          border-radius: 20px;
          padding: 50px 40px;
          text-align: center;
          max-width: 400px;
          width: 90%;
          box-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
        ">
            <h1 style="
              font-family: 'Dancing Script', cursive;
              font-size: 3rem;
              color: #ff4d88;
              margin-bottom: 10px;
            ">Bem‑vindo(a)</h1>
            <p style="
              font-family: 'Raleway', sans-serif;
              color: #cc99b3;
              margin-bottom: 30px;
              font-size: 1.1rem;
            ">Faça login para continuar</p>

            <button id="btn-google-login" style="
              display: inline-flex; align-items: center; justify-content: center;
              gap: 12px;
              padding: 14px 30px;
              background: linear-gradient(45deg, #b3003b, #ff3385);
              border: none;
              border-radius: 50px;
              color: white;
              font-family: 'Raleway', sans-serif;
              font-weight: 600;
              font-size: 1.1rem;
              cursor: pointer;
              box-shadow: 0 5px 20px rgba(179, 0, 59, 0.4);
              transition: transform 0.3s, box-shadow 0.3s;
              width: 100%;
            ">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="white"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="white"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="white"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="white"/>
                </svg>
                Entrar com Google
            </button>

            <p id="login-error" style="
              display: none;
              color: #ff6666;
              font-family: 'Raleway', sans-serif;
              margin-top: 20px;
              font-size: 0.9rem;
            "></p>
        </div>
    </div>

    <!-- CONTEÚDO PROTEGIDO -->
    <div id="conteudo-principal" style="display: none;">
        <!-- Fundo Estrelado -->
        <div id="stars-container"></div>

        <main class="container">
            <div class="poems-header">

            </div>

            <div class="poems-container" id="lista-poesias">

            <div class="poems-actions">

    <!-- Scripts -->

</html>
