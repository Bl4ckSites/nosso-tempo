<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 Meses de Amor ✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Raleway:wght@200;300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles2.css">
    <style>
        /* Apenas os estilos específicos que não estão nos CSS globais */
        :root {
            --ouro: #D4AF37;
            --ouro-claro: #f0d78c;
            --rosa: #ff4d88;
            --rosa-escuro: #b3003b;
            --roxo-profundo: #1a0a2e;
            --roxo-medio: #2d1045;
            --roxo-card: rgba(25, 10, 40, 0.92);
            --texto-claro: #f5e9d9;
            --texto-rosado: #e8c4d0;
            --sombra-ouro: 0 0 30px rgba(212, 175, 55, 0.35);
            --sombra-rosa: 0 0 25px rgba(255, 77, 136, 0.3);
        }

        /* Fundo de estrelas já será criado via console-log.js e styles.css */
        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Overlay de senha fofa (aparece DEPOIS do login Firebase) */
        #senha-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 0, 8, 0.96);
            z-index: 8000; /* abaixo do login do Firebase (9999), mas acima do conteúdo */
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #senha-overlay.escondido {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .senha-card {
            background: var(--roxo-card);
            border: 2px solid var(--ouro);
            border-radius: 24px;
            padding: 50px 40px 40px;
            text-align: center;
            max-width: 440px;
            width: 92%;
            box-shadow: var(--sombra-ouro), inset 0 0 60px rgba(212, 175, 55, 0.05);
            animation: pulseCard 3s ease-in-out infinite;
        }
        @keyframes pulseCard {
            0%, 100% { box-shadow: 0 0 30px rgba(212,175,55,0.3), 0 0 80px rgba(179,0,59,0.15); }
            50% { box-shadow: 0 0 50px rgba(212,175,55,0.5), 0 0 120px rgba(255,77,136,0.25); }
        }
        .senha-card .icone-coroa {
            font-size: 3.5rem;
            color: var(--ouro);
            margin-bottom: 12px;
            animation: brilhar 2s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes brilhar {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(212,175,55,0.5)); }
            50% { filter: drop-shadow(0 0 25px rgba(255,215,0,0.9)); }
        }
        .senha-card h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #ff5c8a;
            margin-bottom: 6px;
            line-height: 1.1;
        }
        .senha-card .subtitulo {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--texto-rosado);
            font-size: 1.05rem;
            margin-bottom: 28px;
            letter-spacing: 0.5px;
        }
        .campo-senha {
            position: relative;
            margin-bottom: 18px;
        }
        .campo-senha input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: 2px solid rgba(212, 175, 55, 0.5);
            border-radius: 50px;
            background: rgba(20, 8, 35, 0.7);
            color: var(--texto-claro);
            font-family: 'Raleway', sans-serif;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: all 0.3s;
            outline: none;
            text-align: center;
        }
        .campo-senha input:focus {
            border-color: var(--ouro);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            background: rgba(30, 12, 50, 0.85);
        }
        .campo-senha input::placeholder {
            color: rgba(200, 170, 180, 0.5);
            font-style: italic;
            letter-spacing: 0.5px;
        }
        .btn-revelar {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(212, 175, 55, 0.7);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 6px;
            transition: color 0.3s;
        }
        .btn-revelar:hover { color: var(--ouro); }
        .btn-entrar {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #b3003b, #ff3385, #ff5c9e);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-family: 'Raleway', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(179, 0, 59, 0.5);
            transition: all 0.35s;
            text-transform: uppercase;
        }
        .btn-entrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 35px rgba(255, 51, 133, 0.6);
        }
        .erro-msg {
            color: #ff6666;
            font-size: 0.85rem;
            margin-top: 8px;
            min-height: 20px;
        }
        .dica {
            color: rgba(200, 170, 180, 0.55);
            font-size: 0.8rem;
            margin-top: 14px;
            font-style: italic;
        }

        /* Conteúdo da página (carta + momentos) */
        #conteudo-pagina {
            padding-bottom: 80px;
        }
        .header-romantico {
            text-align: center;
            padding: 40px 20px 20px;
        }
        .titulo-principal {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5rem, 6vw, 4rem);
            color: #ff5c8a;
            text-shadow: 0 0 30px rgba(255, 92, 138, 0.5);
            margin-bottom: 8px;
        }
        .contador-dias {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            color: var(--ouro-claro);
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(20, 8, 35, 0.5);
            padding: 10px 24px;
            border-radius: 50px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            margin-top: 6px;
        }
        .contador-dias .numero-dias {
            font-weight: 700;
            font-size: 1.8rem;
            color: #fff;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, var(--ouro), #fff8dc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Carta */
        .carta-conteudo {
            max-width: 700px;
            margin: 0 auto 30px;
            padding: 40px 36px;
            background: var(--roxo-card);
            border: 2px solid var(--ouro);
            border-radius: 20px;
            font-family: 'Cormorant Garamond', 'Playfair Display', serif;
            color: var(--texto-claro);
            font-size: 1.2rem;
            line-height: 2;
            min-height: 380px;
            box-shadow: var(--sombra-ouro);
            letter-spacing: 0.3px;
        }
        .carta-conteudo .assinatura {
            display: block;
            margin-top: 24px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: #ff5c8a;
            text-align: right;
        }
        .digitando-cursor::after {
            content: '|';
            animation: blinkCursor 0.9s infinite;
            color: var(--ouro);
            font-weight: 300;
        }
        @keyframes blinkCursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Botão música */
        .musica-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px auto;
            background: linear-gradient(135deg, #b3003b, #ff3385);
            border: none;
            color: #fff;
            padding: 13px 28px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Raleway', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(179, 0, 59, 0.45);
            transition: all 0.35s;
        }
        .musica-btn.tocando {
            background: linear-gradient(135deg, #2d1045, #4a1a6b);
            box-shadow: 0 0 25px rgba(160, 80, 220, 0.4);
        }

        /* Grade de momentos (reaproveitando poem-card) */
        .momentos-titulo {
            text-align: center;
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: var(--ouro-claro);
            margin: 40px 0 20px;
        }
        .grade-momentos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            max-width: 700px;
            margin: 0 auto 30px;
            padding: 0 10px;
        }
        .cartao-momento {
            background: rgba(30, 15, 45, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 16px;
            padding: 20px 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .cartao-momento:hover {
            border-color: var(--ouro);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
            transform: translateY(-4px);
            background: rgba(40, 20, 55, 0.85);
        }
        .cartao-momento .emoji-momento { font-size: 2.4rem; transition: transform 0.4s; }
        .cartao-momento:hover .emoji-momento { transform: scale(1.25) rotate(-8deg); }
        .cartao-momento .label-momento {
            font-family: 'Raleway', sans-serif;
            font-size: 0.8rem;
            color: var(--texto-rosado);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }
        .cartao-momento .surpresa {
            display: none;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            color: #ffb3c9;
            font-size: 0.9rem;
            margin-top: 4px;
            animation: fadeInUp 0.5s ease;
        }
        .cartao-momento.revelado .surpresa { display: block; }
        .cartao-momento.revelado {
            border-color: #ff5c8a !important;
            box-shadow: 0 0 20px rgba(255, 92, 138, 0.35) !important;
        }

        /* Botão voltar (usa classe back-home do styles.css) */
        .back-home {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            margin: 30px auto;
            width: fit-content;
        }

        @media (max-width: 600px) {
            .senha-card { padding: 35px 22px 30px; }
            .senha-card h1 { font-size: 2.3rem; }
            .carta-conteudo { padding: 28px 20px; font-size: 1.05rem; line-height: 1.8; }
            .grade-momentos { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .cartao-momento { min-height: 100px; padding: 14px 10px; }
        }
    </style>
</head>
<body>
    <!-- Fundo de estrelas (fora do conteúdo protegido, como ajustamos antes) -->
    <div id="stars-container"></div>

    <!-- ==================== LOGIN DO FIREBASE (igual às outras páginas) ==================== -->
    <div id="login-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,0,5,0.95);z-index:9999;display:flex;align-items:center;justify-content:center;">
        <div style="background:rgba(30,15,40,0.95);border:2px solid #D4AF37;border-radius:20px;padding:50px 40px;text-align:center;max-width:400px;width:90%;box-shadow:0 0 40px rgba(212,175,55,0.3);">
            <h1 style="font-family:'Dancing Script',cursive;font-size:3rem;color:#ff4d88;margin-bottom:10px;">Bem‑vindo(a)</h1>
            <p style="font-family:'Raleway',sans-serif;color:#cc99b3;margin-bottom:30px;font-size:1.1rem;">Faça login para continuar</p>
            <button id="btn-google-login" style="display:inline-flex;align-items:center;justify-content:center;gap:12px;padding:14px 30px;background:linear-gradient(45deg,#b3003b,#ff3385);border:none;border-radius:50px;color:white;font-family:'Raleway',sans-serif;font-weight:600;font-size:1.1rem;cursor:pointer;box-shadow:0 5px 20px rgba(179,0,59,0.4);width:100%;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="white"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="white"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="white"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="white"/></svg>
                Entrar com Google
            </button>
            <p id="login-error" style="display:none;color:#ff6666;font-family:'Raleway',sans-serif;margin-top:20px;font-size:0.9rem;"></p>
        </div>
    </div>

    <!-- ==================== CONTEÚDO PROTEGIDO (após Firebase) ==================== -->
    <div id="conteudo-principal" style="display:none;">
        
        <!-- ==================== SEGUNDA CAMADA: SENHA FOFA ==================== -->
        <div id="senha-overlay">
            <div class="senha-card">
                <div class="icone-coroa">👑</div>
                <h1>Só mais um segredinho...</h1>
                <p class="subtitulo">Qual é a frase que nos leva ao infinito?</p>
                <div class="campo-senha">
                    <input type="password" id="input-senha" placeholder="Digite a senha..." maxlength="30" autocomplete="off">
                    <button class="btn-revelar" id="btn-revelar" title="Mostrar senha">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <button class="btn-entrar" id="btn-entrar-senha">
                    <i class="fas fa-heart"></i> Desvendar
                </button>
                <p class="erro-msg" id="erro-msg-senha"></p>
                <p class="dica">💡 Dica: começa com "De 5..."</p>

        <!-- ==================== CONTEÚDO DA PÁGINA (carta + momentos) ==================== -->
        <div id="conteudo-pagina" style="display:none;">
            <main class="container">
                <!-- Header -->
                <div class="poems-header">
                    <h1 class="titulo-principal">5 Meses de Nós</h1>
                    <div class="contador-dias">
                        <i class="fas fa-calendar-heart" style="color:#ff5c8a;"></i>

                <div class="carta-conteudo" id="carta"></div>

                    <div class="cartao-momento" data-surpresa="Nosso primeiro beijo foi mágico, o tempo parou ⏳">
                        <span class="emoji-momento">💋</span>
                        <span class="label-momento">1º Beijo</span>

                    </div>
                    <div class="cartao-momento" data-surpresa="Rimos até a barriga doer, lembra? 😂">
                        <span class="emoji-momento">😂</span>
                        <span class="label-momento">Risadas</span>
                        <span class="surpresa"></span>
                    </div>
                    <div class="cartao-momento" data-surpresa="Cada abraço seu é meu lugar favorito no mundo 🫂">
                        <span class="emoji-momento">🫂</span>
                        <span class="label-momento">Abraços</span>

                    </div>
                    <div class="cartao-momento" data-surpresa="Nossos planos são o que me fazem acordar sorrindo 🌅">

                        <span class="label-momento">Sonhos</span>

                    </div>
                    <div class="cartao-momento" data-surpresa="Te amo mais a cada amanhecer, infinitamente ♾️">

    <!-- Scripts -->
    <script src="console-log.js"></script>
    <script type="module" src="auth.js"></script>
    <script>
        // ==================== LÓGICA DA SENHA E CONTEÚDO ====================
        (function() {
            const SENHA_CORRETA = 'De 5 para o infinito...';
            const DATA_INICIO = '2025-12-01'; // Ajuste se necessário
            const NOME_REMETENTE = 'Roger';
            const NOME_DESTINATARIA = 'Luisa';

            // Elementos
            const senhaOverlay = document.getElementById('senha-overlay');
            const inputSenha = document.getElementById('input-senha');
            const btnEntrarSenha = document.getElementById('btn-entrar-senha');
            const btnRevelar = document.getElementById('btn-revelar');
            const erroMsgSenha = document.getElementById('erro-msg-senha');
            const conteudoPagina = document.getElementById('conteudo-pagina');
            const cartaDiv = document.getElementById('carta');
            const diasContador = document.getElementById('dias-contador');
            const playMusicBtn = document.getElementById('playMusic');
            const gradeMomentos = document.getElementById('grade-momentos');

            let senhaVisivel = false;
            let digitacaoConcluida = false;
            let musicaTocando = false;
            let audioCtx = null;
            let oscillatorGain = null;
            let musicInterval = null;

            // ==================== CONTEÚDO DA CARTA ====================
            const cartaTexto = `Minha ${NOME_DESTINATARIA},

Hoje completamos 5 meses. Parece que foi ontem que você me pediu em namoro naquela tarde inesquecível, e desde então minha vida nunca mais foi a mesma.

Você é a minha certeza, o meu porto seguro, a mulher que eu escolhi para todos os dias — os bons e os difíceis. Cada manhã ao seu lado é um presente que eu jamais mereci, mas que abraço com toda a gratidão do mundo.

Obrigado por cada risada solta, por cada abraço apertado, por cada lágrima enxugada com carinho. Obrigado por ser exatamente quem você é: a pessoa mais incrível que já cruzou o meu caminho.

Eu te amo mais do que qualquer poesia pode dizer, mais do que qualquer estrela pode testemunhar. Você é a minha pessoa, o meu lar, o meu amor eterno.

Para sempre, seu ${NOME_REMETENTE}.`;

            // ==================== CONTADOR DE DIAS ====================
            function atualizarContador() {
                const inicio = new Date(DATA_INICIO + 'T00:00:00');
                const hoje = new Date();
                const diffMs = hoje - inicio;
                const dias = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                if (diasContador) diasContador.textContent = dias >= 0 ? dias : '?';
            }

            // ==================== MELODIA (Web Audio API) ====================
            function iniciarAudioContext() {
                if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            const melodia = [
                { freq: 293.66, dur: 0.6 }, { freq: 329.63, dur: 0.6 }, { freq: 349.23, dur: 0.6 },
                { freq: 392.00, dur: 0.6 }, { freq: 349.23, dur: 0.5 }, { freq: 329.63, dur: 0.5 },
                { freq: 293.66, dur: 0.8 }, { freq: 261.63, dur: 0.5 }, { freq: 293.66, dur: 0.5 },
                { freq: 329.63, dur: 0.6 }, { freq: 293.66, dur: 0.7 }, { freq: 349.23, dur: 0.6 },
                { freq: 392.00, dur: 0.5 }, { freq: 440.00, dur: 0.5 }, { freq: 392.00, dur: 0.6 },
                { freq: 349.23, dur: 0.5 }, { freq: 329.63, dur: 0.5 }, { freq: 293.66, dur: 0.8 },
                { freq: 329.63, dur: 0.5 }, { freq: 293.66, dur: 0.6 }, { freq: 261.63, dur: 0.7 },
                { freq: 293.66, dur: 0.6 }, { freq: 329.63, dur: 0.5 }, { freq: 349.23, dur: 0.5 },
                { freq: 329.63, dur: 0.5 }, { freq: 293.66, dur: 0.8 }, { freq: 261.63, dur: 1.0 },
                { freq: 293.66, dur: 1.2 }
            ];

            function tocarMelodia() {
                if (!audioCtx) iniciarAudioContext();
                if (!oscillatorGain) {
                    oscillatorGain = audioCtx.createGain();
                    oscillatorGain.gain.setValueAtTime(0.6, audioCtx.currentTime);
                    oscillatorGain.connect(audioCtx.destination);
                }
                const agora = audioCtx.currentTime;
                let tempo = agora;
                melodia.forEach(nota => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(nota.freq, tempo);
                    gain.gain.setValueAtTime(0, tempo);
                    gain.gain.linearRampToValueAtTime(0.15, tempo + 0.08);
                    gain.gain.setValueAtTime(0.15, tempo + nota.dur * 0.7);
                    gain.gain.linearRampToValueAtTime(0.001, tempo + nota.dur);
                    osc.connect(gain);
                    gain.connect(oscillatorGain);
                    osc.start(tempo);
                    osc.stop(tempo + nota.dur + 0.1);
                    tempo += nota.dur + 0.04;
                });
                const duracaoTotal = melodia.reduce((acc, n) => acc + n.dur + 0.04, 0);
                musicInterval = setTimeout(() => {
                    if (musicaTocando) tocarMelodia();
                }, duracaoTotal * 1000 - 200);
            }

            function iniciarMusica() {
                iniciarAudioContext();
                musicaTocando = true;
                tocarMelodia();
                playMusicBtn.classList.add('tocando');
                playMusicBtn.querySelector('span').textContent = 'Pausar música';
                playMusicBtn.querySelector('i').className = 'fas fa-pause';
            }

            function pausarMusica() {
                musicaTocando = false;
                if (musicInterval) clearTimeout(musicInterval);
                if (oscillatorGain && audioCtx) {
                    oscillatorGain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                }
                playMusicBtn.classList.remove('tocando');
                playMusicBtn.querySelector('span').textContent = 'Tocar nossa música';
                playMusicBtn.querySelector('i').className = 'fas fa-music';
            }

            playMusicBtn.addEventListener('click', () => {
                if (musicaTocando) pausarMusica();
                else iniciarMusica();
            });

            // ==================== EFEITO DE DIGITAÇÃO ====================
            function iniciarDigitacao() {
                if (digitacaoConcluida) return;
                cartaDiv.innerHTML = '';
                let i = 0;
                const velocidade = 35;

                function digitar() {
                    if (i < cartaTexto.length) {
                        const htmlAtual = cartaTexto.substring(0, i)
                            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
                        cartaDiv.innerHTML = htmlAtual + '<span class="digitando-cursor"></span>';
                        cartaDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        i++;
                        const char = cartaTexto[i - 1];
                        const delay = char === '\n' ? velocidade * 4 : (char === '.' || char === '!' || char === '?' ? velocidade * 3 : (char === ',' ? velocidade * 2 : velocidade * (0.7 + Math.random() * 0.6)));
                        setTimeout(digitar, delay);
                    } else {
                        cartaDiv.innerHTML = cartaTexto.replace(/\n/g, '<br>') + `<span class="assinatura">💕 Com todo meu amor, ${NOME_REMETENTE} 💕</span>`;
                        digitacaoConcluida = true;
                    }
                }
                digitar();
            }

            // ==================== VERIFICAÇÃO DA SENHA ====================
            function verificarSenha() {
                const senha = inputSenha.value.trim();
                if (senha.toLowerCase() === SENHA_CORRETA.toLowerCase()) {
                    erroMsgSenha.textContent = '💖 Acesso liberado, meu amor! 💖';
                    erroMsgSenha.style.color = '#66ff99';
                    inputSenha.disabled = true;
                    btnEntrarSenha.disabled = true;
                    setTimeout(() => {
                        senhaOverlay.classList.add('escondido');
                        conteudoPagina.style.display = 'block';
                        atualizarContador();
                        iniciarDigitacao();
                        // Iniciar música automaticamente após 2 segundos
                        setTimeout(() => {
                            if (!musicaTocando) iniciarMusica();
                        }, 2000);
                    }, 600);
                } else {
                    erroMsgSenha.textContent = '❌ Não é essa... tente de novo! 💕';
                    erroMsgSenha.style.color = '#ff6666';
                    inputSenha.value = '';
                    inputSenha.focus();
                }
            }

            btnEntrarSenha.addEventListener('click', verificarSenha);
            inputSenha.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    verificarSenha();
                }
            });

            btnRevelar.addEventListener('click', () => {
                senhaVisivel = !senhaVisivel;
                inputSenha.type = senhaVisivel ? 'text' : 'password';
                btnRevelar.innerHTML = senhaVisivel ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
                inputSenha.focus();
            });

            // ==================== CARTÕES DE MOMENTOS ====================
            gradeMomentos.addEventListener('click', (e) => {
                const cartao = e.target.closest('.cartao-momento');
                if (!cartao) return;
                if (cartao.classList.contains('revelado')) {
                    cartao.classList.remove('revelado');
                } else {
                    cartao.classList.add('revelado');
                    const surpresa = cartao.querySelector('.surpresa');
                    if (surpresa && cartao.dataset.surpresa) surpresa.textContent = cartao.dataset.surpresa;
                }
            });

            // ==================== OBSERVER PARA QUANDO O CONTEÚDO PRINCIPAL APARECER ====================
            const observer = new MutationObserver(() => {
                if (document.getElementById('conteudo-principal').style.display === 'block' && !digitacaoConcluida && cartaDiv.textContent.trim() === '') {
                    // Mostra o overlay de senha automaticamente
                    senhaOverlay.style.display = 'flex';
                    inputSenha.focus();
                }
            });
            observer.observe(document.getElementById('conteudo-principal'), { attributes: true, attributeFilter: ['style'] });

            // Inicializa o contador
            atualizarContador();
            setInterval(atualizarContador, 60000);
        })();
    </script>
</body>
</html>
