<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossos Sonhos ✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Raleway:wght@200;300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles2.css">
    <style>
        /* Estilos específicos – reaproveitando a paleta */
        :root {
            --ouro: #D4AF37;
            --ouro-claro: #f0d78c;
            --rosa: #ff4d88;
            --roxo-card: rgba(25, 10, 40, 0.92);
            --texto-claro: #f5e9d9;
            --texto-rosado: #e8c4d0;
            --sombra-ouro: 0 0 30px rgba(212, 175, 55, 0.35);
        }

        /* Céu estrelado (já gerado pelo console-log.js) */
        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .sonhos-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }
        .cartao-sonho {
            background: var(--roxo-card);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .cartao-sonho:hover {
            border-color: var(--ouro);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            transform: translateY(-6px);
        }
        .cartao-sonho .emoji-sonho {
            font-size: 3rem;
            transition: transform 0.3s;
        }
        .cartao-sonho:hover .emoji-sonho {
            transform: scale(1.2) rotate(-5deg);
        }
        .cartao-sonho .titulo-sonho {
            font-family: 'Raleway', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--texto-claro);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .cartao-sonho .mensagem-revelada {
            display: none;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            color: #ffd1e0;
            font-size: 1.05rem;
            line-height: 1.5;
            margin-top: 8px;
            animation: surgir 0.6s ease;
        }
        @keyframes surgir {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .cartao-sonho.revelado .mensagem-revelada {
            display: block;
        }
        .cartao-sonho.revelado {
            border-color: var(--rosa) !important;
            box-shadow: 0 0 25px rgba(255, 77, 136, 0.5) !important;
            background: rgba(35, 15, 50, 0.9);
        }

        /* Brilhos ao clicar */
        .brilho-particula {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            font-size: 1.2rem;
            color: var(--ouro);
            animation: voar 0.8s ease-out forwards;
        }
        @keyframes voar {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        /* Ações */
        .sonhos-actions {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }
        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }
    </style>
</head>
<body>
    <!-- Fundo de estrelas (igual a todas as páginas) -->
    <div id="stars-container"></div>

    <!-- ========== LOGIN DO FIREBASE (padrão) ========== -->
    <div id="login-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,0,5,0.95);z-index:9999;display:flex;align-items:center;justify-content:center;">
        <div style="background:rgba(30,15,40,0.95);border:2px solid #D4AF37;border-radius:20px;padding:50px 40px;text-align:center;max-width:400px;width:90%;box-shadow:0 0 40px rgba(212,175,55,0.3);">
            <h1 style="font-family:'Dancing Script',cursive;font-size:3rem;color:#ff4d88;margin-bottom:10px;">Bem‑vindo(a)</h1>
            <p style="font-family:'Raleway',sans-serif;color:#cc99b3;margin-bottom:30px;font-size:1.1rem;">Faça login para continuar</p>
            <button id="btn-google-login" style="display:inline-flex;align-items:center;justify-content:center;gap:12px;padding:14px 30px;background:linear-gradient(45deg,#b3003b,#ff3385);border:none;border-radius:50px;color:white;font-family:'Raleway',sans-serif;font-weight:600;font-size:1.1rem;cursor:pointer;box-shadow:0 5px 20px rgba(179,0,59,0.4);width:100%;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="white"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="white"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="white"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="white"/></svg>
                Entrar com Google
            </button>
            <p id="login-error" style="display:none;color:#ff6666;font-family:'Raleway',sans-serif;margin-top:20px;font-size:0.9rem;"></p>
        </div>
    </div>

    <!-- ========== CONTEÚDO PROTEGIDO ========== -->
    <div id="conteudo-principal" style="display:none;">
        <main class="container">
            <div class="poems-header">
                <h1 style="font-family:'Dancing Script',cursive;font-size:3.5rem;color:#ff4d88;text-shadow:0 0 20px rgba(255,77,136,0.6);">Nossos Sonhos</h1>
                <p style="color:#e6d4b2;">Porque o nosso futuro é tão lindo quanto o nosso presente ✨</p>
            </div>

            <!-- Grade de sonhos -->
            <div class="sonhos-container" id="sonhosContainer">
                <!-- Os sonhos serão inseridos via JavaScript -->
            </div>

            <!-- Botão voltar -->
            <div class="sonhos-actions">
                <a href="index.html" class="back-home">
                    <i class="fas fa-home"></i> Voltar para a Home
                </a>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="console-log.js"></script>
    <script type="module" src="auth.js"></script>
    <script>
        (function() {
            // Lista de sonhos (futuramente pode ser carregada do Firestore)
            const sonhos = [
                {
                    emoji: "🏡",
                    titulo: "Nosso Lar",
                    mensagem: "Morar juntos, escolher cada detalhe, fazer do nosso cantinho o lugar mais acolhedor do mundo."
                },
                {
                    emoji: "🌍",
                    titulo: "Viajar o Mundo",
                    mensagem: "Conhecer Paris, Veneza, e depois se perder em praias desertas, sempre de mãos dadas."
                },
                {
                    emoji: "💍",
                    titulo: "Dia do Sim",
                    mensagem: "Trocar alianças, chorar, rir, e selar para sempre o nosso amor diante de todos."
                },
                {
                    emoji: "👶",
                    titulo: "Nossa Família",
                    mensagem: "Ver nossos filhos correndo pela casa, com teus olhos e meu sorriso."
                },
                {
                    emoji: "🎂",
                    titulo: "80 Anos Juntos",
                    mensagem: "Envelhecer ao teu lado, contando rugas e lembranças, ainda apaixonados."
                },
                {
                    emoji: "📖",
                    titulo: "Nosso Livro",
                    mensagem: "Escrever nossa história, publicar cada capítulo, e inspirar outros amores."
                }
            ];

            const container = document.getElementById('sonhosContainer');

            function criarCartoes() {
                let html = '';
                sonhos.forEach((sonho, index) => {
                    html += `
                        <div class="cartao-sonho" data-index="${index}">
                            <span class="emoji-sonho">${sonho.emoji}</span>
                            <span class="titulo-sonho">${sonho.titulo}</span>
                            <span class="mensagem-revelada">${sonho.mensagem}</span>
                        </div>
                    `;
                });
                container.innerHTML = html;
                adicionarEventos();
            }

            function adicionarEventos() {
                const cartoes = document.querySelectorAll('.cartao-sonho');
                cartoes.forEach(cartao => {
                    cartao.addEventListener('click', function(e) {
                        // Efeito de brilhos
                        criarBrilhos(e.clientX, e.clientY);
                        // Revelar/mostrar
                        this.classList.toggle('revelado');
                    });
                });
            }

            function criarBrilhos(x, y) {
                const emojisBrilho = ['✨', '💫', '🌟', '💖', '✨', '💕'];
                for (let i = 0; i < 10; i++) {
                    const particula = document.createElement('span');
                    particula.className = 'brilho-particula';
                    particula.textContent = emojisBrilho[Math.floor(Math.random() * emojisBrilho.length)];
                    particula.style.left = x + 'px';
                    particula.style.top = y + 'px';
                    particula.style.setProperty('--dx', (Math.random() - 0.5) * 120 + 'px');
                    particula.style.setProperty('--dy', (Math.random() - 0.8) * 100 + 'px');
                    document.body.appendChild(particula);
                    setTimeout(() => particula.remove(), 800);
                }
            }

            // Observer para iniciar quando o conteúdo principal ficar visível
            const observer = new MutationObserver(() => {
                if (document.getElementById('conteudo-principal').style.display === 'block') {
                    criarCartoes();
                    observer.disconnect();
                }
            });
            observer.observe(document.getElementById('conteudo-principal'), { attributes: true, attributeFilter: ['style'] });

            // Fallback caso já esteja visível
            if (document.getElementById('conteudo-principal').style.display === 'block') {
                criarCartoes();
            }
        })();
    </script>
</body>
</html>
